services:
  couchdb:
    image: couchdb:latest
    container_name: obsidian-livesync-couchdb
    env_file:
      - ../.env
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    volumes:
      - couchdb-data:/opt/couchdb/data
      - ./docker.ini:/opt/couchdb/etc/local.d/docker.ini:ro
    ports:
      # Bind ONLY to localhost — never exposed publicly
      - "127.0.0.1:5984:5984"
    restart: unless-stopped

volumes:
  couchdb-data:
